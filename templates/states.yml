# Poetry-Ops -- Canonical Submission States
# Source of truth for submission status tracking.
# The status field in submissions.md must contain EXACTLY
# one of these values (case-insensitive). No markdown bold,
# no dates, no extra text. Dates go in the date column.

states:
  - id: evaluated
    label: Evaluated
    description: Journal fit evaluated with report, pending decision to submit

  - id: drafting
    label: Drafting
    description: Manuscript being prepared, cover letter in progress

  - id: submitted
    label: Submitted
    description: Submission sent to journal

  - id: under_review
    label: Under Review
    description: Confirmed received, in reading period

  - id: accepted
    label: Accepted
    description: Poem accepted for publication

  - id: rejected
    label: Rejected
    description: Poem declined by journal

  - id: withdrawn
    label: Withdrawn
    description: Poet withdrew the submission

  - id: published
    label: Published
    description: Poem has been published in the journal

  - id: skip
    label: SKIP
    description: Journal doesn't fit, don't submit
